# n8n — self-hosted workflow automation.
# Access: Tailscale-only editor UI (http://100.103.66.92:5678). NOT public.
# The 127.0.0.1 bind is for host-local health checks and future tunnel origin use.
#   Quip is Discord-first: run a small bot sidecar that connects outbound to
#   Discord and calls n8n internally. Do not expose a public n8n webhook for v1.
# Secrets live in .env (chmod 600):
#   N8N_ENCRYPTION_KEY  <- NEVER lose/rotate this; it encrypts all stored credentials
#   N8N_DB_PASSWORD
#   N8N_RUNNERS_AUTH_TOKEN
# Image pinned (no :latest) so Watchtower can't silently change it.

services:
  n8n-db:
    image: postgres:16-alpine
    container_name: n8n-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:?set in .env}
      POSTGRES_DB: n8n
    volumes:
      - n8n-db-data:/var/lib/postgresql/data
    networks: [n8n-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  n8n:
    image: n8nio/n8n:2.22.6
    container_name: n8n
    user: "1000:1000"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      n8n-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:5678:5678"       # host-local origin for health checks / future Cloudflare Tunnel
      - "100.103.66.92:5678:5678"   # Tailscale IP only — not 0.0.0.0/LAN, not public
    environment:
      # --- URLs / host (Tailscale access; transport encrypted by WireGuard) ---
      - N8N_HOST=100.103.66.92
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_EDITOR_BASE_URL=http://100.103.66.92:5678/
      - WEBHOOK_URL=http://100.103.66.92:5678/
      - N8N_SECURE_COOKIE=false      # required for http access over a private IP
      - N8N_PROXY_HOPS=1             # trust 1 reverse-proxy hop (quip-n8n-gate Caddy); silences X-Forwarded-For warning
      - GENERIC_TIMEZONE=Asia/Kolkata
      - TZ=Asia/Kolkata
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=true
      - N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES=true
      # --- instance security policy (managed by env for reproducibility) ---
      - N8N_SECURITY_POLICY_MANAGED_BY_ENV=true
      - N8N_MFA_ENFORCED_ENABLED=false  # flip to true only after owner MFA is configured
      - N8N_PERSONAL_SPACE_SHARING_ENABLED=false
      - N8N_PERSONAL_SPACE_PUBLISHING_ENABLED=false
      # --- secrets (from .env) ---
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:?set in .env}
      # --- Postgres backend (robust under concurrent webhook executions) ---
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD:?set in .env}
      # --- execution data pruning (keeps DB + disk bounded on a small host) ---
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168              # hours = 7 days
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=10000
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_PROGRESS=false
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=false
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem  # don't bloat the DB with binaries
      # --- isolated Code-node task runners ---
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN:?set in .env}
      - N8N_RUNNERS_MAX_CONCURRENCY=2
      - N8N_NATIVE_PYTHON_RUNNER=true
      # --- privacy / quiet ---
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_HIRING_BANNER_ENABLED=false
      - N8N_METRICS=true
      # --- Node heap cap (~75% of the 1G container limit) so n8n can't starve MOC ---
      - NODE_OPTIONS=--max-old-space-size=768
    volumes:
      - n8n-data:/home/node/.n8n
    networks: [n8n-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1024M

  n8n-runners:
    image: n8nio/runners:2.22.6
    container_name: n8n-runners
    user: "1000:1000"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      n8n:
        condition: service_healthy
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN:?set in .env}
      - N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT=15
    networks: [n8n-net]
    deploy:
      resources:
        limits:
          memory: 256M

  quip-docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: quip-docker-proxy
    restart: unless-stopped
    environment:
      # read-only: list/inspect containers only. Everything else denied.
      CONTAINERS: 1
      INFO: 1
      PING: 1
      POST: 0          # no write verbs (no restart yet — that's Slice 3)
      EXEC: 0
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [n8n-net]
    deploy:
      resources:
        limits:
          memory: 64M

  quip-discord-bot:
    build:
      context: ./quip
      dockerfile: quip-discord-bot/Dockerfile
    container_name: quip-discord-bot
    restart: unless-stopped
    env_file: quip-discord-bot.env
    environment:
      - N8N_INTERNAL_WEBHOOK=http://n8n:5678/webhook/quip
      - DISCORD_ENABLE_MESSAGE_CONTENT=true   # Message Content privileged intent enabled in the Dev Portal
    networks: [n8n-net]
    deploy:
      resources:
        limits:
          memory: 160M

  # Basic-Auth gate in front of n8n for public access via n8n.prsnl.fyi.
  # (Cloudflare Access needs a card; this is the card-free perimeter.)
  # Caddyfile holds the bcrypt hash and is NOT committed (like the .env files).
  quip-n8n-gate:
    image: caddy:2-alpine
    container_name: quip-n8n-gate
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks: [n8n-net]
    deploy:
      resources:
        limits:
          memory: 64M

networks:
  n8n-net:
    name: n8n-net

volumes:
  n8n-data:
  n8n-db-data:
